# MUSE Brain Runner — Docker Compose
#
# Runs the autonomous agent runner (API mode) connecting to a remote brain.
# The brain itself runs as a Cloudflare Worker — see rook-brain/ for deployment.
#
# For a fully self-hosted stack (brain + runner + postgres), the brain needs
# a local backend (SQLite or direct Postgres). This is tracked as Sprint 7.
#
# Usage:
#   cp .env.example .env  # fill in your keys
#   docker compose up -d
#   docker compose logs -f runner

services:
  runner:
    build: .
    env_file: .env
    volumes:
      - ./logs:/app/logs
      - ./system-prompt.txt:/app/system-prompt.txt:ro
    environment:
      - AUDIT_PATH=/app/logs/audit.jsonl
      - SYSTEM_PROMPT_PATH=/app/system-prompt.txt
    restart: unless-stopped
